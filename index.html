<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>pingu.art</title>

<link rel="icon" type="image/png" href="pingu logo.jpeg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:#222;
    color:white;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:45px;
}

header p{
    margin-top:15px;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#ff5c5c;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:#e14d4d;
}

section{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.about{
    text-align:center;
    line-height:1.8;
}

.shop-buttons{
    text-align:center;
    margin-bottom:30px;
}

.shop-buttons a{
    display:inline-block;
    margin:8px;
    padding:12px 25px;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.shopee{
    background:#EE4D2D;
}

.tiktok{
    background:#000;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.gallery img:hover{
    transform:scale(1.03);
}

.video-scroll{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding:10px;
    scroll-behavior:smooth;
}

.video-scroll video{
    width:300px;
    height:500px;
    border-radius:10px;
    flex-shrink:0;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.socials{
    text-align:center;
}

.socials a{
    display:inline-block;
    margin:8px;
    padding:12px 20px;
    background:#333;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

/* Image Popup */

#popup{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

#popup img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.logo-title{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.logo{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:50%;
    border:0.4px solid white;
}


</style>

</head>

<body>

<header>

<div class="logo-title">

    <img src="pingu logo.jpeg" alt="pingu logo" class="logo">

    <h1>pingu.art</h1>

</div>

<p>Lighting up memories✨ Est. 2022</p>

</header>

<section id="gallery">

<div class="shop-buttons">

<a href="https://ph.shp.ee/D1bjJBHZ" target="_blank" class="shopee">
🆂 Shopee Checkout
</a>

<a href="https://vt.tiktok.com/ZS9MgFjgBHxdu-RmOtR/" target="_blank" class="tiktok">
🛒 TikTok Yellow Basket
</a>

</div>

<div class="gallery">

<img src="1.JPEG" onclick="openImage(this.src)">
<img src="2.JPEG" onclick="openImage(this.src)">
<img src="3.JPEG" onclick="openImage(this.src)">
<img src="4.JPEG" onclick="openImage(this.src)">
<img src="5.JPEG" onclick="openImage(this.src)">
<img src="6.JPEG" onclick="openImage(this.src)">
<img src="7.JPEG" onclick="openImage(this.src)">

</div>

</section>

<section>

<div class="video-scroll">

    <video controls>
        <source src="1.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="2.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="3.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="4.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="5.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="6.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="7.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="8.mp4" type="video/mp4">
    </video>

</div>

</section>
<section class="socials">

<h2>Follow Me</h2>

<a href="https://facebook.com/yourpage" target="_blank">
Facebook
</a>

<a href="https://instagram.com/yourpage" target="_blank">
Instagram
</a>

<a href="https://www.tiktok.com/@yourshop" target="_blank">
TikTok
</a>

<a href="mailto:youremail@gmail.com">
Email
</a>

</section>

<footer>

<p>© 2026 FJPB Arts. All Rights Reserved.</p>

</footer>

<!-- Image Popup -->

<div id="popup" onclick="closeImage()">
<img id="popupImage">
</div>

<script>
function openImage(src){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImage").src=src;
}

function closeImage(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
