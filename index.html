<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>pingu.art</title>

<link rel="icon" type="image/png" href="pingu logo.jpeg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:#bfbfbf;
    color:#222;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:45px;
}

header p{
    margin-top:15px;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#ff5c5c;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:#e14d4d;
}

section{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.shop-buttons{
    text-align:center;
    margin-bottom:30px;
}

.shop-buttons a:hover{
    transform:scale(1.05);
    opacity:0.9;
}

.direct{
    background:#24BAFF;
}

.shopee{
    background:#EE4D2D;
}

.tiktok{
    background:#343536;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.gallery img:hover{
    transform:scale(1.03);
}

.video-scroll{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding:10px;
    scroll-behavior:smooth;
}

.video-scroll video{
    width:300px;
    height:500px;
    border-radius:10px;
    flex-shrink:0;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

/* Image Popup */

#popup{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

#popup img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.logo-title{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.logo{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:50%;
    border:0.4px solid white;
}

.header-socials{
    margin-top:20px;
}

.header-socials a{
    display:inline-block;
    margin:0 4px;
    font-size:4px;
    color:white;
    transition:.3s;
}

.header-socials a:hover{
    color:#ff5c5c;
    transform:scale(1.2);
}

.header-socials img{
    width: 40px;
    height: 40px;
    object-fit: contain;
    transition: 0.3s;
}

.shop-buttons a{
    display:inline-block;
    margin:10px;
    padding:18px 40px;
    min-width:200px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    text-decoration:none;
    color:white;
    border-radius:10px;
    transition:0.3s;
    animation: pulseFlash 1.5s infinite;
}

@keyframes pulseFlash{
    0%{
        transform:scale(1);
        filter:brightness(100%);
    }

    50%{
        transform:scale(1.06);
        filter:brightness(200%);
    }

    100%{
        transform:scale(1);
        filter:brightness(100%);
    }
}

</style>

</head>

<body>

<header>

<div class="logo-title">

    <img src="pingu logo.jpeg" alt="pingu logo" class="logo">

    <h1>pingu.art</h1>

</div>

<p>Lighting up memories✨ Est. 2022</p>

<div class="header-socials">
<a href="https://www.facebook.com/profile.php?id=100082812366407" target="_blank">
    <img src="facebook.png" alt="Facebook">
</a>

<a href="https://www.instagram.com/pingu.art.ph?utm_source=qr" target="_blank">
    <img src="instagram.png" alt="Instagram">
</a>
    
<a href="https://www.tiktok.com/@pinguartph?is_from_webapp=1&sender_device=pc_blank" target="_blank">
    <img src="tiktok.png" alt="TikTok">
</a>

<a href="https://x.com/pinguartph" target="_blank">
    <img src="twitter.png" alt="X/Twitter">
</a>

</div>    

</header>

<section id="gallery">

<div class="shop-buttons">

<a href="https://ph.shp.ee/D1bjJBHZ" target="_blank" class="shopee">
⭐ DIRECT ORDER (PRIORITY)
</a>

<a href="https://ph.shp.ee/D1bjJBHZ" target="_blank" class="shopee">
🆂 Shopee Checkout
</a>

<a href="https://vt.tiktok.com/ZS9MgFjgBHxdu-RmOtR/" target="_blank" class="tiktok">
🛒 TikTok Yellow Basket
</a>

</div>

<div class="gallery">

<img src="1.JPEG" onclick="openImage(this.src)">
<img src="2.JPEG" onclick="openImage(this.src)">
<img src="3.JPEG" onclick="openImage(this.src)">
<img src="4.JPEG" onclick="openImage(this.src)">
<img src="5.JPEG" onclick="openImage(this.src)">
<img src="6.JPEG" onclick="openImage(this.src)">
<img src="7.JPEG" onclick="openImage(this.src)">

</div>

</section>

<section>

<div class="video-scroll">

    <video autoplay muted loop playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="2.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="3.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="4.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="5.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="6.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="7.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="8.mp4" type="video/mp4">
    </video>

</div>

</section>

<footer>

<p>© 2026 pingu.art. All Rights Reserved.</p>

</footer>

<!-- Image Popup -->

<div id="popup" onclick="closeImage()">
<img id="popupImage">
</div>

<script>
function openImage(src){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImage").src=src;
}

function closeImage(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
